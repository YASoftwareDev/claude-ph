name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile
        run: python -m py_compile ph.py

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check ph.py

      - name: Smoke test
        run: sh tests/smoke.sh
